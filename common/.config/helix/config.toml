theme = "solarized_light"
[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
# use system clipboard
default-yank-register = "+"
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"
[keys.normal."space"]
q = ":quit"
Q = ":quit-all"
[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
